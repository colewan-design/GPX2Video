<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0d0d0d"/>
    </linearGradient>
    <linearGradient id="route" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#3a8fff"/>
      <stop offset="100%" stop-color="#60b0ff"/>
    </linearGradient>
    <linearGradient id="play" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9a5c"/>
      <stop offset="100%" stop-color="#ff6a1a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="routeGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="88" fill="url(#bg)"/>

  <!-- Subtle inner vignette -->
  <rect width="512" height="512" rx="88" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.04"/>

  <!-- Play triangle (video) — center of icon, orange -->
  <path d="M 174 172 L 174 340 L 362 256 Z" fill="url(#play)" filter="url(#glow)" opacity="0.95"/>

  <!-- GPS route line — diagonal sweep from bottom-left to top-right, passing over play button -->
  <path d="M 60 416
           C 108 396 148 302 210 278
           C 268 256 292 336 352 312
           C 396 294 428 228 460 148"
        fill="none"
        stroke="url(#route)"
        stroke-width="24"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="url(#routeGlow)"/>

  <!-- Route start dot (bottom-left) — hollow pin style -->
  <circle cx="60" cy="416" r="22" fill="#3a8fff" filter="url(#routeGlow)"/>
  <circle cx="60" cy="416" r="10" fill="#0d0d0d"/>

  <!-- Route end dot (top-right) — filled -->
  <circle cx="460" cy="148" r="22" fill="#3a8fff" filter="url(#routeGlow)"/>
  <circle cx="460" cy="148" r="10" fill="#60b0ff"/>
</svg>
